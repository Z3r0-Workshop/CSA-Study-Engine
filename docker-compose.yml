services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - csa-data:/data
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: mistral
      DB_PATH: /data/study.db
    # Needed on Linux — Docker Desktop on Windows/Mac resolves this automatically
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser-side JS hits the API at this URL — must be reachable from the host
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  csa-data:
